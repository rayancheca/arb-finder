<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>arb-finder</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 300px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0a0e17;
        color: #f8fafc;
      }
      .header {
        padding: 16px 18px 12px;
        border-bottom: 1px solid #1e293b;
      }
      .title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .sub {
        margin-top: 4px;
        font-size: 11px;
        color: #64748b;
      }
      .row {
        padding: 10px 18px;
        border-bottom: 1px solid #1e293b;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .row:last-child { border-bottom: none; }
      .label {
        font-size: 11px;
        font-weight: 500;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #22c55e;
      }
      .dot.off { background: #475569; }
      input {
        width: 100%;
        margin-top: 6px;
        padding: 7px 10px;
        background: #0f172a;
        border: 1px solid #1e293b;
        border-radius: 5px;
        color: #f8fafc;
        font-size: 11px;
        font-family: 'JetBrains Mono', monospace;
      }
      button {
        width: 100%;
        padding: 8px;
        margin-top: 10px;
        background: #1e40af;
        color: #f8fafc;
        border: 1px solid #3b82f6;
        border-radius: 5px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #1d4ed8; }
      .pair {
        padding: 14px 18px;
      }
      .pair-label {
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #64748b;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="title">arb-finder</div>
      <div class="sub">Bet-slip autofill across NY sportsbooks</div>
    </div>
    <div class="row">
      <span class="label">FanDuel</span>
      <span class="dot" id="status-fanduel"></span>
    </div>
    <div class="row">
      <span class="label">DraftKings</span>
      <span class="dot" id="status-draftkings"></span>
    </div>
    <div class="row">
      <span class="label">BetMGM</span>
      <span class="dot" id="status-betmgm"></span>
    </div>
    <div class="row">
      <span class="label">Caesars</span>
      <span class="dot" id="status-caesars"></span>
    </div>
    <div class="row">
      <span class="label">BetRivers</span>
      <span class="dot" id="status-betrivers"></span>
    </div>
    <div class="pair">
      <div class="pair-label">Pairing token</div>
      <input
        id="token"
        placeholder="Paste from /settings"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="save">Save token</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
